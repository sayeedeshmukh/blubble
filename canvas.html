<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blubble</title>
    <link rel="stylesheet" href="canvas.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Molle:ital@1&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
  </head>
<body>

<h1 class="title" >bLUbbLE</h1>

<button id="clearAllBtn">Clear All</button>
<button id="globalUndoBtn">Undo Last</button>

<div id="ocean">

  <img id="blubble-bg" src="assets/blubble bg.png" alt="">
  <div class="corals">
    <img id="coral1" src="assets/coral 01.png" alt="">
    <img id="coral2" src="assets/coral 2.png" alt="">
  </div>

</div>

<!-- DRAW PANEL -->
<div id="panel">
  <div id="panel-header">
    DRAW YOUR BLUB
    <button id="minimizeBtn"><p>▼</p></button>
  </div>
  
<div id="panel-body">
  <div class="tools">
    <div class="color-group">
      <button id="brush" title="Pencil"><i data-lucide="pencil"></i></button>
      <input type="color" id="brushColor">
    </div>

    <button id="eraser" title="Eraser"><i data-lucide="eraser"></i></button>
    <button id="clearCanvas" title="Clear"><i data-lucide="trash-2"></i></button>

    <div class="color-group">
      <button id="fill" title="Fill"><i data-lucide="paint-bucket"></i></button>
      <input type="color" id="fillColor">
    </div>

    <button id="undo" title="Undo"><i data-lucide="undo-2"></i></button>

    <button id="save" title="Save"><i data-lucide="fish"></i></button>
    <div class="size-group" title="Brush / Eraser Size">
        <i data-lucide="circle-dot"></i>
        <input type="range" id="brushSize" min="1" max="50" value="3">
      </div>
  </div>
</div>

  <canvas id="canvas" width="300" height="220"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
